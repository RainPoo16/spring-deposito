<script type="module">
import { createHighlighter } from 'https://cdn.jsdelivr.net/npm/shiki@3.22.0/+esm';

const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;

const SUMMARY = "This service exposes a single HTTP boundary for account creation, transaction posting, and account block lifecycle operations. The controller delegates into specialized services that enforce domain rules, then persists through JPA repositories guarded by idempotency tables and constraints. Global error mapping returns consistent ProblemDetail responses while lifecycle events are published in-process after successful state changes.";

const DIAGRAM = `graph TD
  subgraph requestIntake["Request Intake"]
    applicationBootstrap["Application Bootstrap"]
    apiController["HTTP API Controller"]
    requestDtoValidation["Request DTO Validation"]
    globalProblemMapping["Global Problem Mapping"]
  end

  subgraph businessDecisions["Business Decisions"]
    accountLifecycleService["Account Lifecycle Service"]
    transactionPostingService["Transaction Posting Service"]
    blockLifecycleService["Block Lifecycle Service"]
    domainPolicyModel["Domain Policy Model"]
  end

  subgraph dataReliability["Data and Reliability"]
    persistenceAndIdempotency["Persistence and Idempotency"]
    lifecycleEventPublishing["Lifecycle Event Publishing"]
  end

  applicationBootstrap -->|"boots"| apiController
  apiController -->|"binds"| requestDtoValidation
  requestDtoValidation -.->|"fails into"| globalProblemMapping
  apiController -->|"delegates"| accountLifecycleService
  apiController -->|"delegates"| transactionPostingService
  apiController -->|"delegates"| blockLifecycleService
  accountLifecycleService -->|"enforces"| domainPolicyModel
  transactionPostingService -->|"enforces"| domainPolicyModel
  blockLifecycleService -->|"enforces"| domainPolicyModel
  accountLifecycleService -->|"persists"| persistenceAndIdempotency
  transactionPostingService -->|"persists"| persistenceAndIdempotency
  blockLifecycleService -->|"persists"| persistenceAndIdempotency
  accountLifecycleService -->|"emits"| lifecycleEventPublishing
  blockLifecycleService -->|"emits"| lifecycleEventPublishing
  apiController -.->|"maps errors with"| globalProblemMapping

  class applicationBootstrap external
  class apiController component
  class requestDtoValidation event
  class globalProblemMapping utility
  class accountLifecycleService composable
  class transactionPostingService composable
  class blockLifecycleService composable
  class domainPolicyModel utility
  class persistenceAndIdempotency data
  class lifecycleEventPublishing external

  classDef component fill:#a855f7,stroke:#c084fc,color:#fff
  classDef composable fill:#7c3aed,stroke:#a78bfa,color:#fff
  classDef utility fill:#6d28d9,stroke:#8b5cf6,color:#fff
  classDef external fill:#525252,stroke:#737373,color:#fff
  classDef event fill:#d8b4fe,stroke:#e9d5ff,color:#000
  classDef data fill:#9333ea,stroke:#a855f7,color:#fff

  click applicationBootstrap nodeClickHandler "View details"
  click apiController nodeClickHandler "View details"
  click requestDtoValidation nodeClickHandler "View details"
  click globalProblemMapping nodeClickHandler "View details"
  click accountLifecycleService nodeClickHandler "View details"
  click transactionPostingService nodeClickHandler "View details"
  click blockLifecycleService nodeClickHandler "View details"
  click domainPolicyModel nodeClickHandler "View details"
  click persistenceAndIdempotency nodeClickHandler "View details"
  click lifecycleEventPublishing nodeClickHandler "View details"
`;

const NODES = {
  applicationBootstrap: {
    title: "Application Bootstrap",
    description: "`DepositApplication` is the Spring Boot entry point that initializes component scanning and auto-configuration. It exists to wire the full runtime graph before any HTTP request is served.",
    files: ["src/main/java/com/examples/deposit/DepositApplication.java"],
  },
  apiController: {
    title: "HTTP API Controller",
    description: "`DemandDepositAccountController` is the single request boundary for account, transaction, and block endpoints. It exists to translate HTTP contracts into service commands and normalized responses.",
    files: ["src/main/java/com/examples/deposit/controller/DemandDepositAccountController.java"],
    code: `@PostMapping("/demand-deposit-accounts")\npublic ResponseEntity<CreateDemandDepositAccountResp> createDemandDepositAccount(\n    @RequestHeader("x-customer-id") UUID customerId,\n    @RequestBody @Valid CreateDemandDepositAccountReq request\n)`,
    lang: "java",
  },
  requestDtoValidation: {
    title: "Request DTO Validation",
    description: "Request records define the public API payload shape and carry Bean Validation constraints. They exist to reject malformed or incomplete input before business logic runs.",
    files: [
      "src/main/java/com/examples/deposit/controller/dto/CreateDemandDepositAccountReq.java",
      "src/main/java/com/examples/deposit/controller/dto/PostCreditTransactionReq.java",
      "src/main/java/com/examples/deposit/controller/dto/PostDebitTransactionReq.java",
      "src/main/java/com/examples/deposit/controller/dto/CreateDemandDepositAccountBlockReq.java",
      "src/main/java/com/examples/deposit/controller/dto/UpdateDemandDepositAccountBlockReq.java"
    ],
  },
  globalProblemMapping: {
    title: "Global Problem Mapping",
    description: "`GlobalExceptionHandler` plus `ApiProblemFactory` convert domain and validation failures into RFC-style `ProblemDetail` responses. This exists so every endpoint returns a consistent error contract.",
    files: [
      "src/main/java/com/examples/deposit/controller/exception/GlobalExceptionHandler.java",
      "src/main/java/com/examples/deposit/controller/exception/ApiProblemFactory.java"
    ],
  },
  accountLifecycleService: {
    title: "Account Lifecycle Service",
    description: "`DemandDepositAccountService` handles account creation and activation orchestration with eligibility and idempotency checks. It exists to centralize account lifecycle state transitions.",
    files: [
      "src/main/java/com/examples/deposit/service/DemandDepositAccountService.java",
      "src/main/java/com/examples/deposit/service/AccountCreationEligibilityService.java"
    ],
  },
  transactionPostingService: {
    title: "Transaction Posting Service",
    description: "`DemandDepositAccountTransactionService` posts credits and debits under locking, idempotency, and block restrictions. It exists to preserve balance correctness and deterministic replay behavior.",
    files: [
      "src/main/java/com/examples/deposit/service/DemandDepositAccountTransactionService.java",
      "src/main/java/com/examples/deposit/domain/TransactionCodePolicy.java"
    ],
  },
  blockLifecycleService: {
    title: "Block Lifecycle Service",
    description: "`DemandDepositAccountBlockService` creates, updates, and cancels account blocks with actor and overlap rules. It exists to enforce transaction restrictions over defined effective windows.",
    files: ["src/main/java/com/examples/deposit/service/DemandDepositAccountBlockService.java"],
  },
  domainPolicyModel: {
    title: "Domain Policy Model",
    description: "Domain aggregates and policies hold lifecycle and transaction rules close to data state. This exists to keep business invariants explicit and reusable across services.",
    files: [
      "src/main/java/com/examples/deposit/domain/DemandDepositAccount.java",
      "src/main/java/com/examples/deposit/domain/DemandDepositAccountBlock.java",
      "src/main/java/com/examples/deposit/domain/TransactionCodePolicy.java"
    ],
    code: `public void applyDebit(BigDecimal amount, String transactionCode) {\n    requirePositiveAmount(amount);\n    requireEligibleStatus(TransactionType.DEBIT, transactionCode);\n    if (getAvailableBalance().compareTo(amount) < 0) throw new InsufficientAvailableBalanceException(id, getAvailableBalance(), amount);\n}`,
    lang: "java",
  },
  persistenceAndIdempotency: {
    title: "Persistence and Idempotency",
    description: "JPA repositories persist accounts, blocks, transactions, and idempotency records backed by Flyway migrations and unique constraints. This exists to guarantee consistency across retries and concurrent operations.",
    files: [
      "src/main/java/com/examples/deposit/repository/DemandDepositAccountRepository.java",
      "src/main/java/com/examples/deposit/repository/DemandDepositAccountBlockRepository.java",
      "src/main/java/com/examples/deposit/repository/DemandDepositAccountTransactionRepository.java",
      "src/main/java/com/examples/deposit/repository/AccountCreationIdempotencyRepository.java",
      "src/main/java/com/examples/deposit/repository/AccountTransactionIdempotencyRepository.java",
      "src/main/resources/db/migration/V1__create_demand_deposit_account_tables.sql",
      "src/main/resources/db/migration/V2__create_demand_deposit_account_block_tables.sql",
      "src/main/resources/db/migration/V3__add_transaction_posting_and_balance_columns.sql"
    ],
  },
  lifecycleEventPublishing: {
    title: "Lifecycle Event Publishing",
    description: "Spring-backed publishers emit account and block lifecycle events inside the application process. This exists to decouple downstream reactions from core command handlers.",
    files: [
      "src/main/java/com/examples/deposit/service/AccountLifecycleEventPublisher.java",
      "src/main/java/com/examples/deposit/service/SpringAccountLifecycleEventPublisher.java",
      "src/main/java/com/examples/deposit/service/BlockLifecycleEventPublisher.java",
      "src/main/java/com/examples/deposit/service/SpringBlockLifecycleEventPublisher.java"
    ],
  },
};

const LEGEND = [
  { label: 'Component', color: 'bg-node-component' },
  { label: 'Composable', color: 'bg-node-composable' },
  { label: 'Utility', color: 'bg-node-utility' },
  { label: 'External', color: 'bg-node-external' },
  { label: 'Event', color: 'bg-node-event' },
  { label: 'Data', color: 'bg-node-data' },
];

const langs = [...new Set(Object.values(NODES).map((n) => n.lang).filter(Boolean))];
if (langs.length === 0) langs.push('typescript');

let highlighter = null;
try {
  highlighter = await createHighlighter({ themes: ['vitesse-dark'], langs });
} catch (e) {
  console.warn('Shiki failed to load:', e);
}

const HIGHLIGHTED = {};
for (const [id, node] of Object.entries(NODES)) {
  if (node.code && highlighter) {
    try {
      HIGHLIGHTED[id] = highlighter.codeToHtml(node.code, {
        lang: node.lang || 'typescript',
        theme: 'vitesse-dark',
      });
    } catch (e) {
      console.warn(`Highlight failed for ${id}:`, e);
    }
  }
}

function usePanZoom() {
  const viewportRef = useRef(null);
  const canvasRef = useRef(null);
  const zoomDisplayRef = useRef(null);
  const st = useRef({ zoom: 1, panX: 0, panY: 0 });
  const drag = useRef({ on: false, lx: 0, ly: 0 });

  const apply = useCallback(() => {
    const { zoom, panX, panY } = st.current;
    if (canvasRef.current) {
      canvasRef.current.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
    }
    if (zoomDisplayRef.current) {
      zoomDisplayRef.current.textContent = Math.round(zoom * 100) + '%';
    }
  }, []);

  const fitToScreen = useCallback(() => {
    const svg = canvasRef.current?.querySelector('svg');
    const vp = viewportRef.current;
    if (!svg || !vp) return;

    const s = st.current;
    const vw = vp.clientWidth;
    const vh = vp.clientHeight;
    const sw = svg.getBoundingClientRect().width / s.zoom;
    const sh = svg.getBoundingClientRect().height / s.zoom;
    const fit = Math.max(0.15, Math.min(2, Math.min((vw - 80) / sw, (vh - 80) / sh)));

    s.zoom = fit;
    s.panX = (vw - sw * fit) / 2;
    s.panY = (vh - sh * fit) / 2;
    apply();
  }, [apply]);

  useEffect(() => {
    const vp = viewportRef.current;
    if (!vp) return;

    const onWheel = (e) => {
      e.preventDefault();
      const r = vp.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      const s = st.current;

      const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      const nz = Math.min(4, Math.max(0.15, s.zoom * f));
      const sc = nz / s.zoom;

      s.panX = mx - sc * (mx - s.panX);
      s.panY = my - sc * (my - s.panY);
      s.zoom = nz;
      apply();
    };

    const onDown = (e) => {
      if (e.target.closest('.node')) return;
      drag.current = { on: true, lx: e.clientX, ly: e.clientY };
      vp.setPointerCapture(e.pointerId);
    };

    const onMove = (e) => {
      const d = drag.current;
      if (!d.on) return;
      st.current.panX += e.clientX - d.lx;
      st.current.panY += e.clientY - d.ly;
      d.lx = e.clientX;
      d.ly = e.clientY;
      apply();
    };

    const onUp = () => { drag.current.on = false; };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('pointerdown', onDown);
    vp.addEventListener('pointermove', onMove);
    vp.addEventListener('pointerup', onUp);
    vp.addEventListener('pointercancel', onUp);
    window.addEventListener('resize', fitToScreen);

    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('pointerdown', onDown);
      vp.removeEventListener('pointermove', onMove);
      vp.removeEventListener('pointerup', onUp);
      vp.removeEventListener('pointercancel', onUp);
      window.removeEventListener('resize', fitToScreen);
    };
  }, [apply, fitToScreen]);

  const zoomIn = useCallback(() => {
    st.current.zoom = Math.min(4, st.current.zoom * 1.25);
    apply();
  }, [apply]);

  const zoomOut = useCallback(() => {
    st.current.zoom = Math.max(0.15, st.current.zoom / 1.25);
    apply();
  }, [apply]);

  return {
    viewportRef,
    canvasRef,
    zoomDisplayRef,
    zoomIn,
    zoomOut,
    fitToScreen,
  };
}

function MermaidDiagram({ onNodeClick }) {
  const ref = useRef(null);

  useEffect(() => {
    window.nodeClickHandler = onNodeClick;

    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      themeVariables: {
        primaryColor: '#0a0a0a',
        primaryTextColor: '#ffffff',
        primaryBorderColor: '#2a2a2a',
        lineColor: '#a0a0a0',
        secondaryColor: '#000000',
        tertiaryColor: '#000000',
        background: '#000000',
        mainBkg: '#0a0a0a',
        nodeBorder: '#2a2a2a',
        clusterBkg: 'rgba(10,10,10,0.8)',
        clusterBorder: '#7c3aed',
        titleColor: '#ffffff',
        edgeLabelBackground: 'transparent',
      },
      flowchart: {
        useMaxWidth: false,
        htmlLabels: true,
        curve: 'basis',
      },
    });

    mermaid.render('walkthrough-diagram', DIAGRAM).then(({ svg, bindFunctions }) => {
      if (!ref.current) return;
      ref.current.innerHTML = svg;
      bindFunctions?.(ref.current);
    });

    return () => {
      delete window.nodeClickHandler;
    };
  }, [onNodeClick]);

  return h('div', { ref, className: 'mermaid-wrap' });
}

function SummaryCard() {
  return h('div', {
    className: 'fixed top-16 left-6 z-20 max-w-xl px-4 py-3 bg-wt-surface/85 backdrop-blur border border-wt-border rounded-lg shadow-lg'
  },
    h('p', { className: 'text-sm text-wt-muted leading-relaxed' }, SUMMARY)
  );
}

function DetailPanel({ nodeId, node, onClose }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  const codeHtml = HIGHLIGHTED[nodeId];

  return h('div', {
    className: 'fixed top-4 right-4 bottom-4 w-[560px] z-30 bg-wt-surface border border-wt-border rounded-xl shadow-2xl flex flex-col overflow-hidden'
  },
    h('button', {
      onClick: onClose,
      className: 'absolute top-3 right-3 z-10 w-7 h-7 rounded-md border border-wt-border bg-wt-raised text-wt-muted flex items-center justify-center text-lg hover:bg-wt-red hover:border-wt-red hover:text-white transition-colors'
    }, '\u00d7'),
    h('div', { className: 'flex-1 overflow-y-auto p-5' },
      h('h2', { className: 'text-lg font-bold text-wt-fg mb-3 pr-9' }, node.title),
      h('div', { className: 'dt-body' },
        h('p', null, node.description)
      ),
      node.code ? h('div', { className: 'dt-body' },
        codeHtml
          ? h('div', { dangerouslySetInnerHTML: { __html: codeHtml } })
          : h('pre', { className: 'code-fallback' }, h('code', null, node.code))
      ) : null,
      node.files && node.files.length > 0 ? h('div', { className: 'mt-4 pt-3 border-t border-wt-border' },
        h('div', { className: 'text-[0.7rem] uppercase tracking-wider text-wt-muted font-semibold mb-1.5' }, 'Files'),
        h('code', { className: 'text-sm text-wt-file font-mono leading-relaxed' },
          node.files.map((f, i) => h('span', { key: i }, f, h('br')))
        )
      ) : null
    )
  );
}

function ZoomControls({ zoomDisplayRef, onZoomIn, onZoomOut, onFit }) {
  return h('div', {
    className: 'fixed bottom-5 left-5 z-20 flex items-center gap-1 bg-wt-surface border border-wt-border rounded-lg shadow-xl overflow-hidden'
  },
    h('button', {
      onClick: onZoomOut,
      className: 'px-2.5 py-1.5 text-wt-muted hover:text-wt-fg hover:bg-wt-raised transition-colors text-sm'
    }, '-'),
    h('span', {
      ref: zoomDisplayRef,
      className: 'px-2 py-1.5 text-xs text-wt-muted min-w-[3rem] text-center'
    }, '100%'),
    h('button', {
      onClick: onZoomIn,
      className: 'px-2.5 py-1.5 text-wt-muted hover:text-wt-fg hover:bg-wt-raised transition-colors text-sm'
    }, '+'),
    h('button', {
      onClick: onFit,
      className: 'px-2.5 py-1.5 text-wt-muted hover:text-wt-fg hover:bg-wt-raised transition-colors text-xs border-l border-wt-border'
    }, 'Fit')
  );
}

function App() {
  const [activeId, setActiveId] = useState(null);
  const pz = usePanZoom();

  const setActiveNode = useCallback((nodeId) => {
    setActiveId(nodeId);
    document.querySelectorAll('.mermaid-wrap .node').forEach((n) => { n.style.opacity = nodeId ? '0.4' : '1'; });
    if (nodeId) {
      const el = document.querySelector(`.mermaid-wrap .node[id*="${nodeId}"]`);
      if (el) el.style.opacity = '1';
    }
  }, []);

  const closeDetail = useCallback(() => {
    setActiveId(null);
    document.querySelectorAll('.mermaid-wrap .node').forEach((n) => { n.style.opacity = '1'; });
  }, []);

  useEffect(() => {
    setTimeout(pz.fitToScreen, 600);
  }, [pz.fitToScreen]);

  return h(React.Fragment, null,
    h('header', {
      className: 'fixed top-0 inset-x-0 z-20 px-6 py-3.5 bg-gradient-to-b from-wt-bg to-transparent pointer-events-none'
    },
      h('h1', { className: 'text-base font-semibold text-wt-fg' }, 'Demand Deposit Service: High-Level Architecture'),
      h('p', { className: 'text-sm text-wt-muted mt-0.5' }, 'HTTP boundary, business orchestration, persistence guarantees, and lifecycle event flow')
    ),
    h(SummaryCard),
    h('div', {
      ref: pz.viewportRef,
      className: 'w-full h-screen overflow-hidden cursor-grab active:cursor-grabbing'
    },
      h('div', {
        ref: pz.canvasRef,
        className: 'origin-top-left will-change-transform inline-block p-[170px_60px_70px]'
      },
        h(MermaidDiagram, { onNodeClick: setActiveNode })
      )
    ),
    h(ZoomControls, {
      zoomDisplayRef: pz.zoomDisplayRef,
      onZoomIn: pz.zoomIn,
      onZoomOut: pz.zoomOut,
      onFit: pz.fitToScreen,
    }),
    h('div', {
      className: 'fixed bottom-5 left-1/2 -translate-x-1/2 z-20 flex gap-4 px-4 py-2 bg-wt-surface border border-wt-border rounded-lg shadow-xl'
    },
      LEGEND.map((l) => h('span', {
        key: l.label,
        className: 'flex items-center gap-1.5 text-xs text-wt-muted'
      },
      h('span', { className: `w-2 h-2 rounded-full ${l.color}` }),
      l.label))
    ),
    activeId && NODES[activeId] ? h(DetailPanel, {
      nodeId: activeId,
      node: NODES[activeId],
      onClose: closeDetail,
    }) : null,
    h('div', {
      className: 'fixed bottom-5 right-5 z-20 text-xs text-wt-muted opacity-60'
    },
      h('kbd', null, 'Scroll'), ' zoom - ', h('kbd', null, 'Drag'), ' pan - Click nodes'
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
