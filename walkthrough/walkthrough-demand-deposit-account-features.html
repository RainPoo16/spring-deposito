function usePanZoom() {
  const viewportRef = useRef(null);
  const canvasRef = useRef(null);
  const zoomDisplayRef = useRef(null);
  const stateRef = useRef({ zoom: 1, panX: 0, panY: 0 });
  const dragRef = useRef({ on: false, lx: 0, ly: 0 });

  const applyTransform = useCallback(() => {
    const { zoom, panX, panY } = stateRef.current;
    if (canvasRef.current) {
      canvasRef.current.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
    }
    if (zoomDisplayRef.current) {
      zoomDisplayRef.current.textContent = Math.round(zoom * 100) + '%';
    }
  }, []);

  const fitToScreen = useCallback(() => {
    const svg = canvasRef.current?.querySelector('svg');
    const viewport = viewportRef.current;
    if (!svg || !viewport) return;

    const state = stateRef.current;
    const viewportWidth = viewport.clientWidth;
    const viewportHeight = viewport.clientHeight;
    const svgWidth = svg.getBoundingClientRect().width / state.zoom;
    const svgHeight = svg.getBoundingClientRect().height / state.zoom;

    const fitScale = Math.max(0.15, Math.min(2, Math.min(
      (viewportWidth - 80) / svgWidth,
      (viewportHeight - 80) / svgHeight
    )));

    state.zoom = fitScale;
    state.panX = (viewportWidth - svgWidth * fitScale) / 2;
    state.panY = (viewportHeight - svgHeight * fitScale) / 2;
    applyTransform();
  }, [applyTransform]);

  useEffect(() => {
    const viewport = viewportRef.current;
    if (!viewport) return;

    const onWheel = (event) => {
      event.preventDefault();
      const rect = viewport.getBoundingClientRect();
      const mouseX = event.clientX - rect.left;
      const mouseY = event.clientY - rect.top;
      const state = stateRef.current;
      const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
      const newZoom = Math.min(4, Math.max(0.15, state.zoom * factor));
      const zoomScale = newZoom / state.zoom;

      state.panX = mouseX - zoomScale * (mouseX - state.panX);
      state.panY = mouseY - zoomScale * (mouseY - state.panY);
      state.zoom = newZoom;
      applyTransform();
    };

    const onPointerDown = (event) => {
      if (event.target.closest('.node')) return;
      dragRef.current = { on: true, lx: event.clientX, ly: event.clientY };
      viewport.setPointerCapture(event.pointerId);
    };

    const onPointerMove = (event) => {
      const drag = dragRef.current;
      if (!drag.on) return;
      const state = stateRef.current;
      state.panX += event.clientX - drag.lx;
      state.panY += event.clientY - drag.ly;
      drag.lx = event.clientX;
      drag.ly = event.clientY;
      applyTransform();
    };

    const onPointerUp = () => {
      dragRef.current.on = false;
    };

    viewport.addEventListener('wheel', onWheel, { passive: false });
    viewport.addEventListener('pointerdown', onPointerDown);
    viewport.addEventListener('pointermove', onPointerMove);
    viewport.addEventListener('pointerup', onPointerUp);
    viewport.addEventListener('pointercancel', onPointerUp);
    window.addEventListener('resize', fitToScreen);

    return () => {
      viewport.removeEventListener('wheel', onWheel);
      viewport.removeEventListener('pointerdown', onPointerDown);
      viewport.removeEventListener('pointermove', onPointerMove);
      viewport.removeEventListener('pointerup', onPointerUp);
      viewport.removeEventListener('pointercancel', onPointerUp);
      window.removeEventListener('resize', fitToScreen);
    };
  }, [applyTransform, fitToScreen]);

  const zoomIn = useCallback(() => {
    stateRef.current.zoom = Math.min(4, stateRef.current.zoom * 1.25);
    applyTransform();
  }, [applyTransform]);

  const zoomOut = useCallback(() => {
    stateRef.current.zoom = Math.max(0.15, stateRef.current.zoom / 1.25);
    applyTransform();
  }, [applyTransform]);

  return {
    viewportRef,
    canvasRef,
    zoomDisplayRef,
    zoomIn,
    zoomOut,
    fitToScreen
  };
}

function MermaidDiagram({ onNodeClick }) {
  const containerRef = useRef(null);

  useEffect(() => {
    window.nodeClickHandler = onNodeClick;

    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      themeVariables: {
        primaryColor: '#0a0a0a',
        primaryTextColor: '#ffffff',
        primaryBorderColor: '#2a2a2a',
        lineColor: '#a0a0a0',
        background: '#000000',
        secondaryColor: '#000000',
        tertiaryColor: '#000000',
        mainBkg: '#0a0a0a',
        nodeBorder: '#2a2a2a',
        clusterBkg: 'rgba(10,10,10,0.8)',
        clusterBorder: '#7c3aed',
        titleColor: '#ffffff',
        edgeLabelBackground: 'transparent'
      },
      flowchart: {
        useMaxWidth: false,
        htmlLabels: true,
        curve: 'basis'
      }
    });

    mermaid.render('walkthrough-diagram', DIAGRAM).then(({ svg, bindFunctions }) => {
      if (containerRef.current) {
        containerRef.current.innerHTML = svg;
        bindFunctions?.(containerRef.current);
      }
    });

    return () => {
      delete window.nodeClickHandler;
    };
  }, [onNodeClick]);

  return h('div', { ref: containerRef, className: 'mermaid-wrap' });
}

function DetailPanel({ nodeId, node, onClose }) {
  useEffect(() => {
    const onKeyDown = (event) => {
      if (event.key === 'Escape') onClose();
    };
    document.addEventListener('keydown', onKeyDown);
    return () => document.removeEventListener('keydown', onKeyDown);
  }, [onClose]);

  const codeHtml = HIGHLIGHTED[nodeId];

  return h(
    'div',
    {
      className: 'fixed top-4 right-4 bottom-4 w-[560px] z-30 bg-wt-surface border border-wt-border rounded-xl shadow-2xl flex flex-col overflow-hidden'
    },
    h(
      'button',
      {
        onClick: onClose,
        className: 'absolute top-3 right-3 z-10 w-7 h-7 rounded-md border border-wt-border bg-wt-raised text-wt-muted flex items-center justify-center text-lg hover:bg-wt-red hover:border-wt-red hover:text-white transition-colors'
      },
      'x'
    ),
    h(
      'div',
      { className: 'flex-1 overflow-y-auto p-5' },
      h('h2', { className: 'text-lg font-bold text-wt-fg mb-3 pr-9' }, node.title),
      h('div', { className: 'dt-body' }, h('p', null, node.description)),
      node.code
        ? h(
            'div',
            { className: 'dt-body' },
            codeHtml
              ? h('div', { dangerouslySetInnerHTML: { __html: codeHtml } })
              : h('pre', { className: 'code-fallback' }, h('code', null, node.code))
          )
        : null,
      node.files?.length > 0
        ? h(
            'div',
            { className: 'mt-4 pt-3 border-t border-wt-border' },
            h(
              'div',
              { className: 'text-[0.7rem] uppercase tracking-wider text-wt-muted font-semibold mb-1.5' },
              'Files'
            ),
            h(
              'code',
              { className: 'text-sm text-wt-file font-mono leading-relaxed' },
              node.files.map((file, index) => h('span', { key: `${file}-${index}` }, file, h('br')))
            )
          )
        : null
    )
  );
}

function App() {
  const [activeId, setActiveIdState] = useState(null);
  const [summaryCollapsed, setSummaryCollapsed] = useState(true);
  const panZoom = usePanZoom();

  const setActiveNode = useCallback((nodeId) => {
    setActiveIdState(nodeId);
    setSummaryCollapsed(true);

    document.querySelectorAll('.mermaid-wrap .node').forEach((nodeElement) => {
      nodeElement.style.opacity = nodeId ? '0.4' : '1';
    });

    if (nodeId) {
      const selected = document.querySelector(`.mermaid-wrap .node[id*="${nodeId}"]`);
      if (selected) selected.style.opacity = '1';
    }
  }, []);

  const closeDetail = useCallback(() => {
    setActiveIdState(null);
    document.querySelectorAll('.mermaid-wrap .node').forEach((nodeElement) => {
      nodeElement.style.opacity = '1';
    });
  }, []);

  useEffect(() => {
    setTimeout(panZoom.fitToScreen, 600);
  }, [panZoom.fitToScreen]);

  return h(
    window.React.Fragment,
    null,
    h(
      'header',
      {
        className: 'fixed top-0 inset-x-0 z-10 px-6 py-3.5 bg-gradient-to-b from-wt-bg to-transparent pointer-events-none'
      },
      h('h1', { className: 'text-base font-semibold text-wt-fg' }, 'Demand Deposit Account Features Walkthrough'),
      h('p', { className: 'text-sm text-wt-muted mt-0.5' }, 'Account lifecycle, block controls, and transaction posting flow')
    ),
    h(Summary, {
      collapsed: summaryCollapsed,
      onToggle: () => setSummaryCollapsed((collapsed) => !collapsed)
    }),
    h(
      'div',
      {
        ref: panZoom.viewportRef,
        className: 'w-full h-screen overflow-hidden cursor-grab active:cursor-grabbing'
      },
      h(
        'div',
        {
          ref: panZoom.canvasRef,
          className: 'origin-top-left will-change-transform inline-block p-[80px_60px_60px]'
        },
        h(MermaidDiagram, { onNodeClick: setActiveNode })
      )
    ),
    h(ZoomControls, {
      zoomDisplayRef: panZoom.zoomDisplayRef,
      onZoomIn: panZoom.zoomIn,
      onZoomOut: panZoom.zoomOut,
      onFit: panZoom.fitToScreen
    }),
    h(
      'div',
      {
        className: 'fixed bottom-5 left-1/2 -translate-x-1/2 z-20 flex gap-4 px-4 py-2 bg-wt-surface border border-wt-border rounded-lg shadow-xl'
      },
      LEGEND.map((item) => h(
        'span',
        { key: item.label, className: 'flex items-center gap-1.5 text-xs text-wt-muted' },
        h('span', { className: `w-2 h-2 rounded-full ${item.color}` }),
        item.label
      ))
    ),
    activeId && NODES[activeId]
      ? h(DetailPanel, { nodeId: activeId, node: NODES[activeId], onClose: closeDetail })
      : null,
    h(
      'div',
      { className: 'fixed bottom-5 right-5 z-20 text-xs text-wt-muted opacity-50' },
      h('kbd', null, 'Scroll'),
      ' zoom | ',
      h('kbd', null, 'Drag'),
      ' pan | Click nodes'
    )
  );
}

window.ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
