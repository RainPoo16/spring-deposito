---
apiVersion: v1
kind: Service
metadata:
  name: deposit-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: deposit-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deposit-service
  labels:
    app: deposit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deposit-service
  template:
    metadata:
      labels:
        app: deposit-service
    spec:
      containers:
        - name: workload
          image: bank-deposit-service:latest
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: POSTGRES_URL
              value: jdbc:postgresql://deposit-db/deposito
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: deposit-db
                  key: username
            - name: POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: deposit-db
                  key: password
            - name: SPRING_APPLICATION_JSON
              value: |
                {
                  "management.endpoint.health.probes.add-additional-paths": true
                }
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http